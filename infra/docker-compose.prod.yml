version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - devlens-prod-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: devlens-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_RETENTION_DAYS: 7
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./kafka/init-topics.sh:/scripts/init-topics.sh
    networks:
      - devlens-prod-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    environment:
      CLICKHOUSE_DB: devlens
      CLICKHOUSE_USER: devlens
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-devlens_prod}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/prod-config.xml
    networks:
      - devlens-prod-net
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: devlens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devlens_prod}
      POSTGRES_DB: devlens
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - devlens-prod-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devlens"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-devlens_prod}
    volumes:
      - redis-data:/data
    networks:
      - devlens-prod-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    container_name: devlens-api
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT_API: 4000
      HOST: 0.0.0.0
      LOG_LEVEL: info
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: devlens-api-prod
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: devlens
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-devlens_prod}
      CLICKHOUSE_DB: devlens
      REDIS_URL: redis://:${REDIS_PASSWORD:-devlens_prod}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - "4000:4000"
    networks:
      - devlens-prod-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  ai-engine:
    build:
      context: ../
      dockerfile: services/ai-engine/Dockerfile
    container_name: devlens-ai-engine
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: devlens-ai-engine-prod
      REDIS_URL: redis://:${REDIS_PASSWORD:-devlens_prod}@redis:6379/1
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: devlens
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-devlens_prod}
      CLICKHOUSE_DB: devlens
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    networks:
      - devlens-prod-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G

  stream-router:
    build:
      context: ../
      dockerfile: services/stream-router/Dockerfile
    container_name: devlens-stream-router
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: devlens-stream-router-prod
      KAFKA_GROUP_ID: devlens-stream-router-group
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: devlens
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-devlens_prod}
      CLICKHOUSE_DB: devlens
    networks:
      - devlens-prod-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  sandbox:
    build:
      context: ../
      dockerfile: services/sandbox/Dockerfile
    container_name: devlens-sandbox
    environment:
      NODE_ENV: production
      PORT: 5000
      LOG_LEVEL: info
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandbox-temp:/tmp/sandbox
    networks:
      - devlens-prod-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  clickhouse-data:
  postgres-data:
  redis-data:
  sandbox-temp:

networks:
  devlens-prod-net:
    driver: bridge
