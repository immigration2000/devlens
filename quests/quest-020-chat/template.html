<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #e5ddd5; }
  .chat-container { width: 380px; height: 600px; background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { padding: 14px 18px; background: #075e54; color: white; display: flex; align-items: center; gap: 10px; }
  .chat-header .avatar { width: 36px; height: 36px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  .chat-header .info h2 { font-size: 0.95rem; font-weight: 600; }
  .chat-header .info span { font-size: 0.75rem; color: #a8d8c8; }
  #message-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; background: #e5ddd5 url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30z' fill='none' stroke='%23d4ccbe' stroke-width='0.5'/%3E%3C/svg%3E") repeat; }
  .message { display: flex; flex-direction: column; max-width: 75%; }
  .message.mine { align-self: flex-end; }
  .message.theirs { align-self: flex-start; }
  .message .bubble { padding: 8px 12px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; position: relative; word-wrap: break-word; }
  .message.mine .bubble { background: #dcf8c6; border-bottom-right-radius: 4px; }
  .message.theirs .bubble { background: white; border-bottom-left-radius: 4px; }
  .message .time { font-size: 0.65rem; color: #999; margin-top: 2px; }
  .message.mine .time { text-align: right; }
  #typing-indicator { display: none; padding: 4px 12px; font-size: 0.8rem; color: #888; font-style: italic; }
  .input-bar { display: flex; gap: 8px; padding: 10px 12px; background: #f0f0f0; border-top: 1px solid #ddd; }
  #message-input { flex: 1; padding: 10px 14px; border: none; border-radius: 20px; background: white; font-size: 0.9rem; outline: none; }
  #send-btn { width: 40px; height: 40px; border-radius: 50%; background: #075e54; border: none; color: white; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
  #send-btn:hover { background: #064e47; }
</style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">🤖</div>
      <div class="info"><h2>DevBot</h2><span>online</span></div>
    </div>
    <div id="message-list"></div>
    <div id="typing-indicator">DevBot is typing...</div>
    <div class="input-bar">
      <input type="text" id="message-input" placeholder="메시지를 입력하세요..." autocomplete="off">
      <button id="send-btn">➤</button>
    </div>
  </div>
</body>
</html>
