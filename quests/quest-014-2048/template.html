<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #faf8ef; }
  .container { text-align: center; }
  .header { display: flex; align-items: center; justify-content: space-between; width: 340px; margin: 0 auto 12px; }
  h1 { font-size: 2.5rem; font-weight: 800; color: #776e65; }
  .score-box { background: #bbada0; border-radius: 6px; padding: 8px 20px; color: white; text-align: center; }
  .score-box .label { font-size: 0.7rem; text-transform: uppercase; color: #eee4da; }
  #score { font-size: 1.5rem; font-weight: 700; }
  #game-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: #bbada0; border-radius: 8px; padding: 8px; width: 340px; height: 340px; margin: 0 auto; position: relative; }
  .cell { background: #cdc1b4; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; color: #776e65; transition: all 0.15s; }
  .cell[data-value="2"] { background: #eee4da; }
  .cell[data-value="4"] { background: #ede0c8; }
  .cell[data-value="8"] { background: #f2b179; color: white; }
  .cell[data-value="16"] { background: #f59563; color: white; }
  .cell[data-value="32"] { background: #f67c5f; color: white; }
  .cell[data-value="64"] { background: #f65e3b; color: white; }
  .cell[data-value="128"] { background: #edcf72; color: white; font-size: 1.3rem; }
  .cell[data-value="256"] { background: #edcc61; color: white; font-size: 1.3rem; }
  .cell[data-value="512"] { background: #edc850; color: white; font-size: 1.3rem; }
  .cell[data-value="1024"] { background: #edc53f; color: white; font-size: 1.1rem; }
  .cell[data-value="2048"] { background: #edc22e; color: white; font-size: 1.1rem; }
  #message-overlay { display: none; position: absolute; inset: 0; background: rgba(238,228,218,0.7); border-radius: 8px; align-items: center; justify-content: center; }
  #message-text { font-size: 2rem; font-weight: 800; color: #776e65; }
  #new-game-btn { margin-top: 12px; padding: 10px 24px; background: #8f7a66; color: white; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
  #new-game-btn:hover { background: #776e65; }
  .hint { margin-top: 8px; font-size: 0.8rem; color: #9e948a; }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>2048</h1>
      <div class="score-box"><div class="label">Score</div><div id="score">0</div></div>
    </div>
    <div style="position:relative">
      <div id="game-board"></div>
      <div id="message-overlay"><span id="message-text"></span></div>
    </div>
    <button id="new-game-btn">New Game</button>
    <p class="hint">Use arrow keys to move tiles</p>
  </div>
</body>
</html>
