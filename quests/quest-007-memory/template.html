<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 1.5rem; background: #0f172a; color: white; }
  h1 { font-size: 1.3rem; margin-bottom: 0.75rem; }
  .info { display: flex; gap: 2rem; margin-bottom: 1rem; font-size: 0.9rem; color: #94a3b8; }
  #game-board { display: grid; grid-template-columns: repeat(4, 80px); gap: 8px; }
  #game-board > div { width: 80px; height: 80px; background: #3b82f6; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer; transition: transform 0.3s, background 0.3s; user-select: none; }
  #game-board > div:hover { transform: scale(1.05); }
  #game-board > div.flipped { background: #1e293b; border: 2px solid #3b82f6; }
  #game-board > div.matched { background: #22c55e; cursor: default; }
  #reset-btn { margin-top: 1rem; padding: 8px 20px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
</style>
</head>
<body>
  <h1>Memory Card Game</h1>
  <div class="info"><span>Moves: <strong id="moves">0</strong></span><span>Matches: <strong id="matches">0</strong>/8</span></div>
  <div id="game-board"></div>
  <button id="reset-btn">Reset</button>
</body>
</html>
