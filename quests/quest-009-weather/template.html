<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 2rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
  #app { width: 100%; max-width: 420px; }
  h1 { font-size: 1.5rem; color: white; margin-bottom: 1rem; text-align: center; }
  .search-group { display: flex; gap: 8px; margin-bottom: 1rem; }
  #city-input { flex: 1; padding: 10px 14px; border: none; border-radius: 8px; font-size: 1rem; outline: none; }
  #search-btn { padding: 10px 18px; background: rgba(255,255,255,0.2); color: white; border: 2px solid rgba(255,255,255,0.3); border-radius: 8px; cursor: pointer; font-weight: 600; }
  #search-btn:hover { background: rgba(255,255,255,0.3); }
  #weather-info { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 12px; padding: 24px; color: white; display: none; }
  #weather-info h2 { font-size: 1.3rem; }
  #weather-info .temp { font-size: 3rem; font-weight: 700; margin: 0.5rem 0; }
  #error-message { color: #fecaca; text-align: center; margin: 1rem 0; display: none; }
  #loading-spinner { text-align: center; color: white; margin: 1rem 0; display: none; }
  h3 { color: white; margin: 1.5rem 0 0.5rem; font-size: 0.9rem; }
  #history-list { list-style: none; }
  #history-list li { padding: 6px 10px; margin-bottom: 4px; background: rgba(255,255,255,0.1); border-radius: 6px; color: white; font-size: 0.85rem; cursor: pointer; }
  #history-list li:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>
  <div id="app">
    <h1>Weather App</h1>
    <div class="search-group">
      <input type="text" id="city-input" placeholder="도시 이름을 입력하세요">
      <button id="search-btn">검색</button>
    </div>
    <div id="loading-spinner">검색 중...</div>
    <div id="error-message"></div>
    <div id="weather-info"></div>
    <h3>검색 기록</h3>
    <ul id="history-list"></ul>
  </div>
</body>
</html>
