<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 1.5rem; background: #0f172a; color: white; }
  h1 { font-size: 1.3rem; margin-bottom: 0.75rem; }
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .toolbar label { font-size: 0.85rem; color: #94a3b8; }
  #speed-slider { width: 120px; }
  button { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
  #sort-btn { background: #3b82f6; color: white; }
  #sort-btn:hover { background: #2563eb; }
  #generate-btn { background: #6b7280; color: white; }
  #generate-btn:hover { background: #4b5563; }
  #canvas { border: 1px solid #334155; border-radius: 4px; background: #1e293b; }
</style>
</head>
<body>
  <h1>Sorting Visualizer</h1>
  <div class="toolbar">
    <label>Speed</label><input type="range" id="speed-slider" min="1" max="100" value="50">
    <button id="generate-btn">Generate</button>
    <button id="sort-btn">Sort</button>
  </div>
  <canvas id="canvas" width="600" height="350"></canvas>
</body>
</html>
