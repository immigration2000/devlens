<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 1rem; background: #0f172a; color: white; }
  h1 { font-size: 1.3rem; margin-bottom: 0.5rem; }
  .info { display: flex; gap: 2rem; margin-bottom: 0.5rem; font-size: 0.9rem; color: #94a3b8; }
  #gameCanvas { border: 2px solid #334155; border-radius: 4px; background: #1e293b; }
  .controls { margin-top: 0.5rem; font-size: 0.8rem; color: #64748b; }
</style>
</head>
<body>
  <h1>Snake Game</h1>
  <div class="info"><span>Score: <strong id="score">0</strong></span><span>Press Space to Start</span></div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <p class="controls">WASD / Arrow Keys to move</p>
</body>
</html>
