<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 2rem; background: #f8f9fa; }
  #app { width: 100%; max-width: 520px; }
  h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #333; }
  #quiz { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  #progress { font-size: 0.85rem; color: #6b7280; margin-bottom: 8px; }
  #timer { font-size: 1.1rem; font-weight: 700; color: #ef4444; float: right; }
  #question { font-size: 1.15rem; font-weight: 600; margin: 16px 0; color: #111; }
  #options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 8px; background: white; cursor: pointer; font-size: 1rem; text-align: left; transition: border-color 0.2s; }
  .option-btn:hover { border-color: #3b82f6; background: #eff6ff; }
  .option-btn.correct { border-color: #22c55e; background: #f0fdf4; }
  .option-btn.incorrect { border-color: #ef4444; background: #fef2f2; }
  #result { display: none; text-align: center; padding: 2rem; }
  #finalScore { font-size: 3rem; font-weight: 800; color: #3b82f6; }
  #percentage { font-size: 1rem; color: #6b7280; margin-top: 4px; }
  #restart { margin-top: 1rem; padding: 10px 24px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; }
</style>
</head>
<body>
  <div id="app">
    <h1>퀴즈</h1>
    <div id="quiz">
      <div style="display:flex;justify-content:space-between"><span id="progress">1/10</span><span id="timer">30</span></div>
      <div id="question">문제가 여기에 표시됩니다</div>
      <div id="options"></div>
    </div>
    <div id="result">
      <p>최종 점수</p>
      <div id="finalScore">0</div>
      <div id="percentage">0%</div>
      <button id="restart">다시 풀기</button>
    </div>
  </div>
</body>
</html>
